<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadasto de jogos</title>
  <link rel="stylesheet" href="./../style/formulario.css" class="stylesheet" />
</head>

<body>
  <main>
    <section class="container_formulario">
      <div>
        <img id="imagem_formulario" src="./../assets/formulario.png" alt="Imagem do formulário">
      </div>
      <div class="div_formulario">
        <h3>Inscreva-se abaixo! </h3>
        <input type="text" id="nome" placeholder="Digite nome e sobrenome" />
        <input type="email" id="email" placeholder="Digite o email" />
        <input type="number" id="numero" placeholder="Digite o numero" />
        <p id="texto_cursos"> Escolha o curso que deseja participar </p>
        <select class="select">
          <!-- Lista suspensa. Seleciono as opções -->
          <option class="option"> Programação HTML </option>
          <option class="option"> Informática básica </option>
          <option class="option"> Programação em log </option>
        </select>
        <button onclick = "Cadastrar()" id="enviar"> Enviar </button>
      </div>
    </section>

    <section>
      <p id="nome_cadastrado"></p>
      <p id="email_cadastrado"></p>
      <p id="numero_cadastrado"> </p>
    </section>
  </main>

  <script src = "./../javascript/formulario.js"></script>
  
</body>

</html>
